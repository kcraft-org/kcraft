name: Rust

on:
  workflow_call:
    inputs:
      build_type:
        type: string
        default: Debug
      version:
        type: string

jobs:
  build:
    name: "Rust (${{ matrix.target }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'crates/kcraft-gui/frontend/package-lock.json'

      - name: Build Frontend
        run: |
          cd crates/kcraft-gui/frontend
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Test
        run: cargo test --locked --release --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --locked --release --target ${{ matrix.target }} -- -D warnings

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kcraft-rust-${{ matrix.target }}-${{ inputs.version || github.sha }}
          path: |
            target/${{ matrix.target }}/release/kcraft
            target/${{ matrix.target }}/release/kcraft-gui
            target/${{ matrix.target }}/release/kcraft.exe
            target/${{ matrix.target }}/release/kcraft-gui.exe
          if-no-files-found: warn
