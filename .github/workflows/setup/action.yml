name: 'Setup Rust Environment'
description: 'Setup Rust toolchain and required system dependencies for KCraft'

inputs:
  target:
    required: false
    description: 'Optional additional Rust target to install'
  components:
    required: false
    description: 'Optional Rust toolchain components (e.g. rustfmt,clippy)'

runs:
  using: "composite"
  steps:
    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}
        components: ${{ inputs.components }}

    - name: Install System Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: >-
        sudo apt-get update &&
        sudo apt-get install -y
        libwebkit2gtk-4.1-dev
        build-essential
        curl
        wget
        file
        libssl-dev
        libgtk-3-dev
        libayatana-appindicator3-dev
        librsvg2-dev