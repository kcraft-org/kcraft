name: Continuous Integration

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Cargo Format
        run: cargo fmt --all -- --check
      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test Workspace
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install Nuxt Frontend
        working-directory: crates/kcraft-gui/frontend
        env:
          NUXT_TELEMETRY_DISABLED: 1
        run: npm ci
      - name: Build Nuxt Frontend
        working-directory: crates/kcraft-gui/frontend
        env:
          NUXT_TELEMETRY_DISABLED: 1
        run: npm run generate
      - name: Cargo Test
        run: cargo test --workspace --all-features
