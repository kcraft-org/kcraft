name: Continuous Integration

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget file libssl-dev libfontconfig-dev
      - name: Cargo Format
        run: cargo fmt --all -- --check
      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test Workspace
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev build-essential libssl-dev libfontconfig-dev
      - name: Cargo Test
        run: cargo test --workspace --all-features
