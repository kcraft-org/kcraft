name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Native Apps
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev build-essential libssl-dev libfontconfig-dev

      - name: Cargo Test
        run: cargo test --workspace --all-features

      - name: Build GUI Binary
        run: cargo build --release -p kcraft-gui --target ${{ matrix.target }}

      - name: Rename Binary for Upload
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/kcraft-gui${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          dst="kcraft-gui-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cp "$src" "$dst"

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcraft-gui-${{ matrix.target }}
          path: kcraft-gui-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Read Changelog
        id: changelog
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          file="changelog/${version}.md"
          if [ -f "$file" ]; then
            body=$(cat "$file")
            delimiter="$(openssl rand -hex 16)"
            echo "body<<$delimiter" >> $GITHUB_OUTPUT
            echo "$body" >> $GITHUB_OUTPUT
            echo "$delimiter" >> $GITHUB_OUTPUT
          else
            echo "body=" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: ${{ steps.changelog.outputs.body }}
