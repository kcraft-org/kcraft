name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Native Apps
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Nuxt Frontend
        working-directory: crates/kcraft-gui/frontend
        env:
          NUXT_TELEMETRY_DISABLED: 1
        run: npm ci

      - name: Build Nuxt Frontend
        working-directory: crates/kcraft-gui/frontend
        env:
          NUXT_TELEMETRY_DISABLED: 1
        run: npm run generate

      - name: Verify Frontend Build
        working-directory: crates/kcraft-gui/frontend
        run: test -d .output/public && echo "Frontend build OK" || { echo "Frontend build missing"; exit 1; }

      - name: Cargo Test
        run: cargo test --workspace --all-features

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KCraft ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: ./crates/kcraft-gui/src-tauri
          includeUpdaterJson: true
