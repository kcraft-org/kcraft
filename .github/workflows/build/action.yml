name: 'Build and Package'
description: 'build and package KCraft'
inputs:
  run_codeql:
    default: 'false'
  sparkle_key:
    required: false
  shell:
    default: 'bash'
  build_type:
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure CMake
      shell: ${{ inputs.shell }}
      run: ./.ci/configure.sh
      env:
        BUILD_TYPE: ${{ inputs.build_type }}

    - name: Build
      shell: ${{ inputs.shell }}
      run: cmake --build build

    - name: Test
      shell: ${{ inputs.shell }}
      run: ctest --test-dir build --output-on-failure

    - name: Package
      shell: ${{ inputs.shell }}
      run: ./.ci/${{ env.PLATFORM }}/package.sh
      env:
        SPARKLE_KEY: ${{ inputs.sparkle_key }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: KCraft-${{ env.BUILD_ID }}
        path: artifacts/*
        if-no-files-found: error