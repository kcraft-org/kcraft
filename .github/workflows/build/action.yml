name: 'Build and Test'
description: 'Build and test KCraft Rust workspace'

inputs:
  target:
    required: false
    description: 'Optional Rust target triple for cross-compilation'

runs:
  using: "composite"
  steps:
    - name: Build Workspace
      shell: bash
      run: |
        if [ -n "${{ inputs.target }}" ]; then
          cargo build --workspace --target ${{ inputs.target }}
        else
          cargo build --workspace
        fi

    - name: Test Workspace
      shell: bash
      run: cargo test --workspace --all-features