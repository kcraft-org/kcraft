# Cargo Deny Configuration
# See https://embarkstudios.github.io/cargo-deny/ for full documentation

[advisories]
# Advisory level to warn on
vulnerability = "warn"
# Advisory level to error on
unmaintained = "warn"
yanked = "warn"
notice = "warn"

# A list of advisory IDs to ignore. Use this if there is an advisory that you have investigated
# and determined that it is either not applicable or you have decided to accept the risk.
# Uncomment when ignoring specific advisories:
# ignore = [
#   "RUSTSEC-2021-XXXX",
# ]

[licenses]
# Lint level for crates which do not have a detectable license
unlicensed = "deny"
# Lint level for crates which do not have a detectable copyright statement
copyleft = "warn"
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "both"
# Lint level used when no other predicates are matched
default = "deny"
# The confidence threshold for detecting a license from license text.
confidence-threshold = 0.8
# Allow 1 or more licenses on a per-crate basis the homepage field is a valid,
# navigable URL.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT OR Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "GPL-3.0-only",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level used when a crate marked as 'deprecated' is detected
deprecated = "warn"
# Lint level used when a crate marked as 'unmaintained' is detected
unmaintained = "warn"
# The graph highlighting used when creating dotgraphs using `cargo deny check --show-graph`
# If this is enabled, `requires = true`
highlight = "all"
# List of explicitly allowed duplicate crates
allow = [
  # Each entry the name of the crate that is allowed to have duplicates
  # { name = "ansi_term", version = "=0.11.0" },
]
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = [
  # { name = "ansi_term", version = "=0.11.0" },
]
# Similarly named crates that are allowed to co-exist
skip-tree = [
  # { name = "windows-", version = "*" },
]

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list is detected
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not in the allow list is detected
unknown-git = "warn"
# The path where the `deny.lock` file is located, used as a complement to all the granular lint levels above.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
