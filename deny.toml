[advisories]
ignore = [
    # paste is unmaintained but is only a transitive dependency of Slint GUI framework
    # We accept this risk as Slint is actively maintained and paste is only used internally
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "GPL-3.0-only",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
